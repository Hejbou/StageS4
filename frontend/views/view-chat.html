<div class="chat-wrapper">
  <div class="messages-list" id="messages"></div>

  <!-- Typing indicator -->
  <div class="typing-indicator hidden" id="typing-indicator">
    <div class="msg-avatar">
      <svg width="18" height="18" viewBox="0 0 44 44" fill="none">
        <defs>
          <linearGradient id="av-chat" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#6C63FF"/>
            <stop offset="100%" stop-color="#06B6D4"/>
          </linearGradient>
        </defs>
        <rect width="44" height="44" rx="13" fill="#0D0B1E"/>
        <rect x="8"  y="17" width="5" height="10" rx="2.5" fill="url(#av-chat)" opacity="0.70"/>
        <rect x="15" y="14" width="5" height="16" rx="2.5" fill="url(#av-chat)" opacity="0.85"/>
        <rect x="19.5" y="9"  width="5" height="26" rx="2.5" fill="url(#av-chat)"/>
        <rect x="24" y="14"  width="5" height="16" rx="2.5" fill="url(#av-chat)" opacity="0.85"/>
        <rect x="31" y="17"  width="5" height="10" rx="2.5" fill="url(#av-chat)" opacity="0.70"/>
      </svg>
    </div>
    <div class="typing-bubble">
      <span></span><span></span><span></span>
    </div>
  </div>

  <!-- Quick action chips -->
  <div class="quick-actions" id="quick-actions">
    <button class="chip" data-action="request">
      <i data-lucide="car"></i>
      <span id="chip-request">Demander transport</span>
    </button>
    <button class="chip" data-action="status">
      <i data-lucide="map-pin"></i>
      <span id="chip-status">Mon statut</span>
    </button>
    <button class="chip" data-action="cancel">
      <i data-lucide="circle-x"></i>
      <span id="chip-cancel">Annuler</span>
    </button>
    <button class="chip" data-action="help">
      <i data-lucide="circle-help"></i>
      <span id="chip-help">Aide</span>
    </button>
  </div>
</div>

<!-- Autocomplete suggestions -->
<div id="suggestions-panel" class="suggestions-panel hidden" role="listbox" aria-label="Suggestions de lieux"></div>

<!-- Chat input bar -->
<div class="chat-input-bar" id="chat-input-bar">
  <button class="mic-btn" id="mic-btn" aria-label="Microphone">
    <i data-lucide="mic"></i>
  </button>
  <input
    type="text"
    id="chat-input"
    autocomplete="off"
    autocorrect="off"
    spellcheck="false"
    placeholder="Écrivez votre message..."
  >
  <button class="send-btn" id="send-btn" aria-label="Envoyer">
    <i data-lucide="send-horizontal"></i>
  </button>
</div>

<!-- Voice Recording Bar -->
<div class="voice-rec-bar hidden" id="voice-rec-bar" data-state="recording">
  <button class="vrb-cancel-btn" id="vrb-cancel-btn" aria-label="Annuler l'enregistrement">
    <i data-lucide="trash-2"></i>
  </button>
  <div class="vrb-center">
    <div class="vrb-waveform" id="vrb-waveform">
      <span></span><span></span><span></span><span></span>
      <span></span><span></span><span></span><span></span>
    </div>
    <span class="vrb-status" id="vrb-status">Enregistrement...</span>
    <span class="vrb-timer" id="vrb-timer">00:00</span>
  </div>
  <button class="vrb-stop-btn" id="vrb-stop-btn" aria-label="Arrêter l'enregistrement">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor" stroke="none">
      <rect x="4" y="4" width="16" height="16" rx="3"/>
    </svg>
  </button>
  <button class="vrb-send-btn hidden" id="vrb-send-btn" aria-label="Envoyer le message vocal">
    <i data-lucide="send-horizontal"></i>
  </button>
</div>
